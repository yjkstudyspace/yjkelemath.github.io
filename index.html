<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的学习空间站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 科幻深空背景 + 网格光效 */
        body {
            font-family: "微软雅黑", "PingFang SC", sans-serif;
            min-height: 100vh;
            color: #e0f7ff;
            line-height: 1.8;
            padding: 50px 20px;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.15), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(120, 0, 255, 0.15), transparent 50%),
                linear-gradient(135deg, #0a0e27 0%, #121a3a 50%, #0d142e 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景网格线 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题发光效果 */
        h1 {
            text-align: center;
            font-size: 42px;
            margin-bottom: 10px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8),
                         0 0 20px rgba(0, 240, 255, 0.5),
                         0 0 40px rgba(0, 240, 255, 0.3);
            letter-spacing: 3px;
        }

        .subtitle {
            text-align: center;
            color: #8ab4f8;
            margin-bottom: 50px;
            font-size: 16px;
            letter-spacing: 2px;
        }

        /* 个人介绍卡片 */
        .profile-card {
            background: rgba(20, 30, 60, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
        }

        .profile-card h2 {
            color: #00f0ff;
            margin-bottom: 15px;
            font-size: 24px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            padding-bottom: 10px;
        }

        .profile-card p {
            color: #c0d8f0;
            font-size: 16px;
            margin-bottom: 8px;
        }

        /* 课程分类板块 */
        h2.section-title {
            text-align: center;
            color: #a0e7ff;
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        /* 课程卡片 */
        .course-card {
            background: rgba(20, 30, 60, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 14px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: #e0f7ff;
            transition: all 0.3s ease;
            display: block;
        }

        .course-card:hover {
            transform: translateY(-5px);
            border-color: #00f0ff;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }

        .course-card h3 {
            color: #00f0ff;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .course-card p {
            color: #90b4d0;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            color: #5a7a9a;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 我的学习空间站</h1>
        <p class="subtitle">LEARNING SPACE STATION · 知识探索基地</p>

        <!-- 个人介绍区域 -->
        <div class="profile-card">
            <h2>👨‍💻 关于我：数学兴趣爱好</h2>
            <p>你好，欢迎来到我的个人学习网站。</p>
            <p>这里整理了我学习过的所有课程讲义与视频，方便随时回顾和分享。</p>
            <p>📧 联系方式：your@email.com</p>
        </div>

        <!-- 课程分类入口 -->
        <h2 class="section-title">📚 课程分类</h2>
        <div class="course-grid">
            <!-- 课程1 卡片 -->
            <a href="course1.html" class="course-card">
                <h3>课程一：高一数学</h3>
                <p>初窥门径</p>
            </a>

            <!-- 课程2 卡片 -->
            <a href="course2.html" class="course-card">
                <h3>课程二：高二数学</h3>
                <p>披荆斩棘</p>
            </a>

            <!-- 课程3 卡片 -->
            <a href="course3.html" class="course-card">
                <h3>课程三：高三数学</h3>
                <p>融会贯通</p>
            </a>

            <!-- 课程4 卡片 -->
            <a href="course4.html" class="course-card">
                <h3>课程四：基础数学</h3>
                <p>分析、代数、几何</p>
            </a>
           <!-- 课程5 卡片 -->
            <a href="course5.html" class="course-card">
                <h3>课程五：应用数学</h3>
                <p>控制论、最优化、AI数学</p>
            </a>
           <!-- 课程6 卡片 -->
            <a href="course6.html" class="course-card">
                <h3>课程六：待定</h3>
                <p>待定</p>
            </a>

        </div>

        <div class="footer">
            © 2026 我的学习空间站 · 持续更新中
        </div>
    </div>
</body>
</html>
